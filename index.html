<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Le Cabinet · Max</title>
<meta name="description" content="Une petite bibliothèque de trucs faits, ou à faire." />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗄️</text></svg>" />
<style>
  :root {
    --bg: #0b0c0f;
    --bg-tile: #141619;
    --bg-tile-hover: #1c1f24;
    --border: #23262d;
    --border-hover: #3a3f48;
    --text: #e7e9ee;
    --text-dim: #8b909b;
    --accent: #6ee7b7;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-font-smoothing: antialiased; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    line-height: 1.5;
  }
  a { color: inherit; text-decoration: none; }

  .wrap { max-width: 980px; margin: 0 auto; padding: 72px 24px 96px; }

  header { margin-bottom: 48px; }
  .kicker {
    font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 14px;
  }
  h1 {
    font-size: clamp(34px, 6vw, 56px); font-weight: 650; letter-spacing: -0.02em;
    line-height: 1.05;
  }
  h1 .dot { color: var(--accent); }
  .sub { color: var(--text-dim); margin-top: 16px; max-width: 46ch; font-size: 15px; }

  .toolbar {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    margin: 36px 0 22px;
  }
  .search {
    flex: 1 1 200px; min-width: 160px;
    background: var(--bg-tile); border: 1px solid var(--border);
    color: var(--text); padding: 10px 14px; border-radius: 10px; font-size: 14px;
    outline: none; transition: border-color .15s;
  }
  .search:focus { border-color: var(--border-hover); }
  .search::placeholder { color: var(--text-dim); }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    padding: 8px 14px; border-radius: 999px; font-size: 13px; cursor: pointer;
    transition: all .15s; font-family: inherit;
  }
  .chip:hover { border-color: var(--border-hover); color: var(--text); }
  .chip.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  .grid {
    display: grid; gap: 14px;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  }
  .tile {
    position: relative; display: flex; flex-direction: column;
    background: var(--bg-tile); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 22px; min-height: 148px;
    transition: transform .16s ease, background .16s, border-color .16s;
    overflow: hidden;
  }
  .tile:hover {
    background: var(--bg-tile-hover); border-color: var(--border-hover);
    transform: translateY(-3px);
  }
  .tile .emoji { font-size: 30px; margin-bottom: auto; }
  .tile h3 { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; margin-top: 14px; }
  .tile p { color: var(--text-dim); font-size: 13.5px; margin-top: 6px; }
  .tile .meta {
    display: flex; gap: 8px; align-items: center; margin-top: 14px;
    font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .08em;
  }
  .tile .tag { border: 1px solid var(--border); padding: 3px 8px; border-radius: 999px; }
  .tile.wip::after {
    content: "en cours"; position: absolute; top: 14px; right: -30px;
    background: var(--accent); color: #06281d; font-size: 10px; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase; padding: 3px 34px;
    transform: rotate(38deg);
  }

  .empty { color: var(--text-dim); font-size: 14px; padding: 40px 0; text-align: center; }

  footer {
    margin-top: 64px; padding-top: 24px; border-top: 1px solid var(--border);
    color: var(--text-dim); font-size: 13px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  }
  footer a { color: var(--text); text-decoration: underline; text-underline-offset: 3px; }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="kicker">Bibliothèque personnelle</div>
      <h1>Le Cabinet<span class="dot">.</span></h1>
      <p class="sub">Une collection de trucs — jeux, outils, expériences, écrits — faits ensemble, ou à venir. Accessible de partout.</p>
    </header>

    <div class="toolbar">
      <input class="search" id="search" type="search" placeholder="Chercher…" autocomplete="off" />
      <div class="filters" id="filters"></div>
    </div>

    <main class="grid" id="grid"></main>
    <div class="empty" id="empty" hidden>Rien ici… pour l'instant.</div>

    <footer>
      <span id="count"></span>
      <span>Fait avec Claude · <a href="https://github.com/maximethillbell-png/maximethillbell-png.github.io">source</a></span>
    </footer>
  </div>

<script>
const grid = document.getElementById('grid');
const empty = document.getElementById('empty');
const filtersEl = document.getElementById('filters');
const searchEl = document.getElementById('search');
const countEl = document.getElementById('count');
let projects = [];
let activeCat = 'tout';
let query = '';

function render() {
  const q = query.trim().toLowerCase();
  const list = projects.filter(p => {
    const catOk = activeCat === 'tout' || (p.category || '').toLowerCase() === activeCat;
    const text = (p.title + ' ' + (p.description||'') + ' ' + (p.category||'')).toLowerCase();
    return catOk && (!q || text.includes(q));
  });
  grid.innerHTML = '';
  list.forEach(p => {
    const el = p.url ? document.createElement('a') : document.createElement('div');
    el.className = 'tile' + (p.wip ? ' wip' : '');
    if (p.url) { el.href = p.url; }
    el.innerHTML = `
      <div class="emoji">${p.emoji || '✦'}</div>
      <h3>${p.title}</h3>
      ${p.description ? `<p>${p.description}</p>` : ''}
      <div class="meta">
        ${p.category ? `<span class="tag">${p.category}</span>` : ''}
        ${p.date ? `<span>${p.date}</span>` : ''}
      </div>`;
    grid.appendChild(el);
  });
  empty.hidden = list.length !== 0;
  countEl.textContent = `${projects.length} truc${projects.length>1?'s':''} dans le cabinet`;
}

function buildFilters() {
  const cats = ['tout', ...Array.from(new Set(projects.map(p => (p.category||'').toLowerCase()).filter(Boolean)))];
  filtersEl.innerHTML = '';
  cats.forEach(c => {
    const b = document.createElement('button');
    b.className = 'chip' + (c === activeCat ? ' active' : '');
    b.textContent = c;
    b.onclick = () => { activeCat = c; buildFilters(); render(); };
    filtersEl.appendChild(b);
  });
}

searchEl.addEventListener('input', e => { query = e.target.value; render(); });

fetch('projects.json?' + Date.now())
  .then(r => r.json())
  .then(data => {
    projects = data.sort((a,b) => (b.date||'').localeCompare(a.date||''));
    buildFilters();
    render();
  })
  .catch(() => { empty.hidden = false; empty.textContent = 'Impossible de charger projects.json'; });
</script>
</body>
</html>
