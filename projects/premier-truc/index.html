<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Un premier truc · Le Cabinet</title>
<style>
  :root { --bg:#0b0c0f; --text:#e7e9ee; --dim:#8b909b; --accent:#6ee7b7; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; min-height:100vh; display:flex; flex-direction:column; }
  .top { padding:24px; }
  a.back { color:var(--dim); font-size:14px; text-decoration:none; }
  a.back:hover { color:var(--text); }
  main { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; text-align:center; padding:24px; }
  h1 { font-size:clamp(28px,7vw,52px); letter-spacing:-0.02em; }
  p { color:var(--dim); max-width:40ch; }
  button {
    background:var(--accent); color:#06281d; border:none; font-family:inherit; font-weight:700;
    font-size:16px; padding:14px 26px; border-radius:12px; cursor:pointer; transition:transform .1s;
  }
  button:active { transform:scale(.96); }
  #out { font-size:44px; min-height:56px; }
</style>
</head>
<body>
  <div class="top"><a class="back" href="../../index.html">← retour au cabinet</a></div>
  <main>
    <h1>Un premier truc</h1>
    <p>Juste une démo interactive pour montrer qu'une tuile peut ouvrir n'importe quoi : un jeu, un outil, une expérience…</p>
    <div id="out">🎲</div>
    <button onclick="roll()">Lancer le dé</button>
  </main>
<script>
  const faces = ['⚀','⚁','⚂','⚃','⚄','⚅'];
  function roll(){
    let n = 0;
    const t = setInterval(()=>{ document.getElementById('out').textContent = faces[Math.floor(Math.random()*6)]; if(++n>10) clearInterval(t); }, 60);
  }
</script>
</body>
</html>
