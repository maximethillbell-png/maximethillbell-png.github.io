<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dofusdle · Admin mobs</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1320;--card:#1a2036;--line:#2c355a;--txt:#eef1ff;--muted:#9aa2c8;--orange:#f5a01e;--green:#5cb85c;--red:#d9534f;--warn:#e7c13a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Fredoka',sans-serif;background:var(--bg);color:var(--txt);padding:18px 16px 40px}
h1{font-size:22px;margin-bottom:2px}
.sub{color:var(--muted);font-size:13px;margin-bottom:14px}
.bar{position:sticky;top:0;z-index:5;background:var(--bg);padding:10px 0;display:flex;gap:10px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--line);margin-bottom:16px}
input,select,button{font-family:inherit}
.bar input[type=search]{flex:1;min-width:180px;background:var(--card);border:1px solid var(--line);color:#fff;padding:10px 12px;border-radius:10px;outline:none;font-size:14px}
.bar select{background:var(--card);border:1px solid var(--line);color:#fff;padding:10px;border-radius:10px;font-size:13px}
.count{font-size:13px;color:var(--muted)}
.count b{color:#fff}.count .ex{color:var(--red)}
.btn{background:var(--orange);color:#3a2600;border:none;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer;font-size:13px}
.btn.sec{background:var(--card);color:#fff;border:1px solid var(--line)}
.grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(230px,1fr))}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;position:relative;transition:.15s}
.card.excluded{opacity:.4;filter:grayscale(.7)}
.card .top{display:flex;gap:10px;align-items:center}
.card .sp{width:60px;height:60px;flex:0 0 60px;background:#0c1020;border:2px solid var(--orange);border-radius:10px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.card .sp img{width:100%;height:100%;object-fit:contain}
.card h3{font-size:15px;line-height:1.1}
.card .lv{font-size:12px;color:var(--muted)}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.chip{font-size:11px;font-weight:600;padding:3px 8px;border-radius:7px;background:#222a47;color:#cfd6f5}
.chip.race{background:#2b2140;color:#e5c8ff}
.chip.boss{background:#5a2020;color:#ffd4d4}.chip.avis{background:#5a4520;color:#ffe6b0}
.chip.faib{background:#5a2020;color:#ffd0d0}.chip.res{background:#204a20;color:#cdf0cd}
.chip.zone{background:#20344a;color:#bfe0ff}
.spell{font-size:12px;color:#ffce7a;margin-top:8px;font-style:italic}
.excl{margin-top:10px;width:100%;border:1px solid var(--line);background:#20263f;color:#fff;border-radius:9px;padding:8px;font-weight:600;cursor:pointer;font-size:13px}
.card.excluded .excl{background:var(--green);color:#08260c;border-color:var(--green)}
.badge{position:absolute;top:8px;right:8px;font-size:10px;font-weight:700;background:var(--red);color:#fff;padding:2px 7px;border-radius:6px;display:none}
.card.excluded .badge{display:block}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#000;color:#fff;padding:10px 18px;border-radius:10px;opacity:0;transition:.2s;font-size:13px}
.toast.show{opacity:.92}
</style></head><body>
<h1>Dofusdle · Curation des mobs</h1>
<div class="sub">Passe en revue les mobs, exclus ceux que tu ne veux pas, puis exporte le <b>game_data.json</b> filtré. Tes choix sont sauvegardés dans le navigateur.</div>
<div class="bar">
  <input id="q" type="search" placeholder="Chercher un mob, une famille, une zone…">
  <select id="fcat"><option value="">Catégorie : toutes</option><option>Mob de base</option><option>Boss</option><option>Avis de recherche</option></select>
  <select id="fzone"></select>
  <select id="fstate"><option value="">Tous</option><option value="kept">Gardés</option><option value="excluded">Exclus</option></select>
  <span class="count" id="count"></span>
  <button class="btn" id="export">⬇ Exporter game_data.json</button>
  <button class="btn sec" id="copyex">Copier les exclus</button>
  <button class="btn sec" id="reset">Réinitialiser</button>
</div>
<div class="grid" id="grid"></div>
<div class="toast" id="toast"></div>

const KEY='dofusdle_admin_excluded';
let excluded=new Set(JSON.parse(localStorage.getItem(KEY)||'[]'));
const $=id=>document.getElementById(id);
const grid=$('grid');
// zones pour le filtre
const zones=[...new Set(MOBS.flatMap(m=>m.zone))].sort();
$('fzone').innerHTML='<option value="">Zone : toutes</option>'+zones.map(z=>`<option>${z}</option>`).join('');
function save(){localStorage.setItem(KEY,JSON.stringify([...excluded]));}
function toast(t){const e=$('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1400);}
function norm(s){return s.normalize('NFD').replace(/\p{Diacritic}/gu,'').toLowerCase();}
function render(){
  const q=norm($('q').value.trim()),fc=$('fcat').value,fz=$('fzone').value,fs=$('fstate').value;
  grid.innerHTML='';let shown=0;
  MOBS.forEach(m=>{
    const ex=excluded.has(m.nom);
    if(fc&&m.categorie!==fc)return;
    if(fz&&!m.zone.includes(fz))return;
    if(fs==='kept'&&ex)return; if(fs==='excluded'&&!ex)return;
    if(q){const t=norm(m.nom+' '+m.type+' '+m.zone.join(' '));if(!t.includes(q))return;}
    shown++;
    const c=document.createElement('div');c.className='card'+(ex?' excluded':'');
    const catCls=m.categorie==='Boss'?'boss':m.categorie==='Avis de recherche'?'avis':'';
    c.innerHTML=`<div class="badge">EXCLU</div>
     <div class="top"><div class="sp"><img src="${m.img}" loading="lazy" onerror="this.style.display='none'"></div>
       <div><h3>${m.nom}</h3><div class="lv">Niv. ${m.niveau} · ${m.tranche}</div></div></div>
     <div class="chips">
       <span class="chip race">${m.type}</span>
       <span class="chip ${catCls}">${m.categorie}</span>
       ${m.zone.map(z=>`<span class="chip zone">${z}</span>`).join('')}
       <span class="chip">Invuln: ${m.invulnerabilite}</span>
       ${m.faiblesse.map(f=>`<span class="chip faib">↓${f}</span>`).join('')}
       ${m.resistance.map(r=>`<span class="chip res">↑${r}</span>`).join('')}
     </div>
     ${m.hintSpell?`<div class="spell">Sort : ${m.hintSpell}</div>`:''}
     <button class="excl">${ex?'✓ Exclu (cliquer pour inclure)':'Exclure ce mob'}</button>`;
    c.querySelector('.excl').onclick=()=>{if(excluded.has(m.nom))excluded.delete(m.nom);else excluded.add(m.nom);save();render();};
    grid.appendChild(c);
  });
  $('count').innerHTML=`<b>${MOBS.length-excluded.size}</b> gardés · <span class="ex">${excluded.size}</span> exclus · ${shown} affichés`;
}
['q','fcat','fzone','fstate'].forEach(id=>$(id).addEventListener('input',render));
$('export').onclick=()=>{
  const kept=MOBS.filter(m=>!excluded.has(m.nom));
  const blob=new Blob([JSON.stringify(kept,null,1)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='game_data.json';a.click();
  toast(kept.length+' mobs exportés');
};
$('copyex').onclick=()=>{navigator.clipboard.writeText([...excluded].join('\n'));toast(excluded.size+' noms copiés');};
$('reset').onclick=()=>{if(confirm('Réinitialiser les exclusions ?')){excluded.clear();save();render();}};
render();
</script></body></html>
